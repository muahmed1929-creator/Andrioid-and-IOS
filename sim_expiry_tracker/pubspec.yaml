name: sim_expiry_tracker
description: A startup-quality SIM and Account management app with smart expiry tracking.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^17.2.2

  # Local Storage
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.2

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0
  firebase_crashlytics: ^5.2.0
  google_sign_in: ^7.2.0

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # UI / UX
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.0
  font_awesome_flutter: ^11.0.0
  intl: ^0.20.2
  shimmer: ^3.0.0
  flex_color_scheme: ^8.4.0
  awesome_snackbar_content: ^0.1.3
  badges: ^3.1.2

  # Utilities
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  share_plus: ^13.1.0
  csv: ^8.0.0
  connectivity_plus: ^7.1.1
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  isar_generator: ^3.1.0+1
  freezed: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
