name: iOS Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows you to manually trigger the build from GitHub Actions tab

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.x' # Adjust to your flutter version if needed

      - name: Install dependencies
        run: flutter pub get

      - name: Code Generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install
          cd ..

      - name: Build iOS (No Codesign)
        # Builds the iOS app without a developer certificate.
        # This proves the app compiles successfully for iOS.
        # To install on a real iPhone, Apple Developer certificates are required.
        run: flutter build ios --release --no-codesign

      - name: Upload iOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-app
          path: build/ios/iphoneos/Runner.app
          retention-days: 7
